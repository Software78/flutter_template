name: flutter_template
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.2 <4.0.0"

dependencies:
  awesome_extensions: ^2.0.8
  cached_network_image: ^3.2.3
  cupertino_icons: ^1.0.2
  dartz: ^0.10.1
  dio: ^5.0.1
  easy_localization: 3.0.2
  easy_refresh: ^3.3.1+1
  encrypt: ^5.0.1
  firebase_core: ^2.13.1
  firebase_crashlytics: ^3.3.2
  firebase_messaging: ^14.6.3
  firebase_performance: ^0.9.2+2
  firebase_performance_dio: ^0.5.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.2
  flutter_launcher_icons: ^0.12.0
  flutter_native_splash: ^2.2.18
  flutter_screenutil: ^5.6.1
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.2
  fluttertoast: ^8.2.1
  form_validator: ^2.1.1
  freezed_annotation: ^2.2.0
  get_it: ^7.6.0
  go_router: ^6.2.0
  google_fonts: ^4.0.3
  intl: ^0.18.0
  isar: 3.0.5
  isar_flutter_libs: 3.0.5
  keyboard_service: ^2.0.2
  loading_indicator: ^3.1.1
  lottie: ^2.4.0
  path_provider: ^2.0.15
  permission_handler: ^10.3.0
  pinput: ^2.2.31
  pretty_dio_logger: ^1.3.1
  shared_preferences: ^2.0.18
  shimmer: ^2.0.0
  sprintf: ^7.0.0
  timeago: ^3.3.0

dev_dependencies:
  build_runner: ^2.3.3
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.3.5
  isar_generator: 3.0.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/vectors/
    - assets/animations/
